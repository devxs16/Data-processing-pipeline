<!DOCTYPE html>
<html>
<head>

<title>Processing</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    text-align:center;
    margin-top:120px;
}

.card{
    width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 2px 10px lightgray;
}

a{
    text-decoration:none;
}

button{
    padding:10px 20px;
    border:none;
    background:#0078d4;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Processing Started</h2>

<p>Processing file:</p>

<h3>{{ file }}</h3>

<a href="/">
<button>Back to Dashboard</button>
</a>

</div>

</body>
</html>
